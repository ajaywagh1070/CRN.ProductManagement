name: .NET Build and Test

on:
push:
branches:
- main
- master

pull_request:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '10.0.x'

  - name: Restore Packages
    run: dotnet restore

  - name: Build Project
    run: dotnet build --no-restore

  - name: Run Tests
    run: dotnet test --no-build
