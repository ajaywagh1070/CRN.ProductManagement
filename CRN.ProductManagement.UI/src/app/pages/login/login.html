<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-header">
          Login
        </div>

        <div class="card-body">

          <div class="mb-3">
            <label>User Name</label>
            <input type="text"
                   class="form-control"
                   [(ngModel)]="userName">
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   class="form-control"
                   [(ngModel)]="password">
          </div>

          <button class="btn btn-primary w-100"
                  (click)="login()">

            Login

          </button>

        </div>

      </div>

    </div>

  </div>

</div>
